<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Radiant Sec</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: #fff;
      color: #111827;
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #e5e7eb; }
    }

    /* Terminal window */
    .terminal {
      width: 100%;
      max-width: 580px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      .terminal {
        border-color: #2a2a2a;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }
    }

    /* Titlebar */
    .terminal-bar {
      background: #f3f4f6;
      padding: 0.65rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    @media (prefers-color-scheme: dark) {
      .terminal-bar { background: #1e1e1e; }
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green  { background: #28c840; }

    .terminal-title {
      margin-left: 0.4rem;
      font-size: 0.72rem;
      color: #9ca3af;
      letter-spacing: 0.03em;
    }

    /* Body */
    .terminal-body {
      background: #fafafa;
      padding: 1.4rem 1.6rem 1.6rem;
      font-size: 0.875rem;
      line-height: 2;
    }

    @media (prefers-color-scheme: dark) {
      .terminal-body { background: #161616; }
    }

    .line { display: flex; gap: 0.5ch; flex-wrap: wrap; }
    .spacer { height: 0.6rem; }

    .prompt { color: #e63946; font-weight: 700; user-select: none; }
    .cmd    { color: #111827; }
    .tag-error { color: #e63946; font-weight: 600; }
    .tag-info  { color: #6b7280; }
    .key    { color: #6b7280; min-width: 8ch; }
    .val    { color: #111827; }

    @media (prefers-color-scheme: dark) {
      .cmd { color: #d1d5db; }
      .val { color: #d1d5db; }
    }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 8px;
      height: 1.1em;
      background: #e63946;
      vertical-align: text-bottom;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Nav links below terminal */
    .nav-links {
      margin-top: 2rem;
      display: flex;
      gap: 1.75rem;
      font-size: 0.82rem;
    }

    .nav-links a {
      color: #e63946;
      text-decoration: none;
      transition: opacity 0.15s ease;
    }

    .nav-links a:hover { opacity: 0.75; }
  </style>
</head>
<body>

  <div class="terminal">
    <div class="terminal-bar">
      <span class="dot dot-red"></span>
      <span class="dot dot-yellow"></span>
      <span class="dot dot-green"></span>
      <span class="terminal-title">bash — radiantsec.io</span>
    </div>
    <div class="terminal-body">
      <div class="line">
        <span class="prompt">$</span>
        <span class="cmd">curl https://radiantsec.io<span id="req-path"></span></span>
      </div>
      <div class="spacer"></div>
      <div class="line">
        <span class="tag-error">[!]</span>
        <span class="key">Error:</span>
        <span class="val">404 Not Found</span>
      </div>
      <div class="line">
        <span class="tag-info">[*]</span>
        <span class="key">Target:</span>
        <span class="val" id="out-path"></span>
      </div>
      <div class="line">
        <span class="tag-info">[*]</span>
        <span class="key">Status:</span>
        <span class="val" id="status-msg">Resource does not exist</span>
      </div>
      <div class="line">
        <span class="tag-info">[*]</span>
        <span class="key">Suggest:</span>
        <span class="val">/docs or /blog</span>
      </div>
      <div class="spacer"></div>
      <div class="line">
        <span class="prompt">$</span>
        <span class="cursor"></span>
      </div>
    </div>
  </div>

  <nav class="nav-links">
    <a href="/">~/home</a>
    <a href="/docs">~/docs</a>
    <a href="/blog">~/blog</a>
  </nav>

  <script>
    var p = window.location.pathname;
    document.getElementById('req-path').textContent = p;
    document.getElementById('out-path').textContent = p;
    var msgs = [
      "Resource does not exist",
      "Target moved or never existed",
      "Enumerate harder — you missed something",
      "Route not found. Check your pivot.",
      "Dead end. Try a different vector.",
      "Null reference. Recon incomplete.",
      "Scope boundary reached.",
      "Access denied. Wrong path.",
      "Host unreachable. Check your routes.",
      "Module not found. Try another vector."
    ];
    document.getElementById('status-msg').textContent = msgs[Math.floor(Math.random() * msgs.length)];
  </script>

</body>
</html>
